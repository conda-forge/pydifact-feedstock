schema_version: 1

context:
  name: pydifact
  version: "0.2.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pydifact-${{ version }}.tar.gz
  sha256: 7e17cfff9f0fa52235bf958fe17a133931b09d2c10add8797392b861743d301b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }},<3.10

tests:
  - python:
      imports:
        - pydifact
        - pydifact.control
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: A Python EDI file parser.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/nerdocs/pydifact

extra:
  recipe-maintainers:
    - fhoehle
