schema_version: 1

context:
  name: pydifact
  version: "0.2.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/pydifact-${{ version }}.tar.gz
  sha256: fb68b9aa4c95f3ee360849d762ae662f3355b88a7781229d875976d1509bcda3

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - pydifact
        - pydifact.control
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: A Python EDI file parser.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/nerdocs/pydifact

extra:
  recipe-maintainers:
    - fhoehle
